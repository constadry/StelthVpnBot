services:
  vpn-bot:
    build: .
    container_name: vpn-bot
    restart: always
    env_file: .env

    volumes:
      # SQLite DB lives on the host — survives container restarts/rebuilds
      - ./data:/app/data

    # Optional: keep logs manageable
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
